<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <rect width="32" height="32" rx="6" fill="#0F1116"/>
  <!-- Compass Dial Ring -->
  <circle cx="16" cy="16" r="11" fill="none" stroke="#E8C77A" stroke-width="1.5" opacity="0.8"/>
  <circle cx="16" cy="16" r="6" fill="none" stroke="#E8C77A" stroke-width="1" stroke-dasharray="2 2" opacity="0.5"/>
  <!-- Alignment Axes -->
  <line x1="16" y1="5" x2="16" y2="27" stroke="#E8C77A" stroke-width="0.5" opacity="0.3" />
  <line x1="5" y1="16" x2="27" y2="16" stroke="#E8C77A" stroke-width="0.5" opacity="0.3" />
  <!-- Compass Needle (North / Gold) -->
  <polygon points="16,8 19,16 16,14" fill="#E8C77A" />
  <polygon points="16,8 13,16 16,14" fill="#C9B48A" />
  <!-- Compass Needle (South / Ash Shadow) -->
  <polygon points="16,24 19,16 16,18" fill="#736B72" opacity="0.6" />
  <polygon points="16,24 13,16 16,18" fill="#4A4550" opacity="0.6" />
</svg>
